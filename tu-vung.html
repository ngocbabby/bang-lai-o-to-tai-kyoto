<body>
  <main class="wrap">
    <header class="hero"><a class="backlink" href="index.html">← Về trang chính</a><div class="eyebrow">Nhật - Việt • Lái xe ô tô</div><h1>Học từ vựng lái xe</h1><p class="subtitle">Flashcard có furigana, tự đọc tiếng Nhật và danh sách được chia theo từng phần trong tài liệu.</p></header>
    <nav class="tabs" aria-label="Chọn phần"><button class="tab active" data-tab="cards">1. Flashcard</button><button class="tab" data-tab="list">2. Danh sách</button></nav>

        <div class="progress-row"><div class="bar"><i id="progressBar"></i></div><span id="progressText" class="progress-text"></span></div>

              <span class="face back"><span id="backGroup" class="badge"></span><span id="backTerm" class="jp"></span><span id="meaning" class="meaning"></span><span id="speaker" class="speaker" role="button">🔊 Nghe lại</span><span class="hint">Chạm thẻ để quay lại</span></span>

        <p class="small-note">Khi lật mặt sau, app tự đọc từ tiếng Nhật. Furigana chỉ để nhìn và không được đưa vào nội dung loa đọc. Tiến độ được nhớ trên máy này.</p>
      </div>
    </section>

    </section>

  let pool=[...vocab], index=0, flipped=false;
  let japaneseVoice=null;
  function loadVoices(){const vs=speechSynthesis.getVoices();japaneseVoice=vs.find(v=>/^ja[-_]/i.test(v.lang)&&/Google|Kyoko|O-Ren|Nanami|Japanese/i.test(v.name))||vs.find(v=>/^ja[-_]/i.test(v.lang))||null}
  if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices}
  function speak(text){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=.82;u.pitch=1;if(japaneseVoice)u.voice=japaneseVoice;speechSynthesis.speak(u)}
  function setFlipped(value,auto=false){flipped=value;$('#flashcard').classList.toggle('flipped',value);if(value&&auto)setTimeout(()=>speak(pool[index].speak),180)}
  function updateCard(){if(!pool.length)return;const v=pool[index];const html=renderParts(v.parts);$('#frontTerm').innerHTML=html;$('#backTerm').innerHTML=html;$('#meaning').textContent=v.vi;$('#frontGroup').textContent=groupMap[v.group].title;$('#backGroup').textContent=`${index+1}/${pool.length} • ${groupMap[v.group].title}`;const done=learned.has(v.id);$('#learn').classList.toggle('done',done);$('#learn').textContent=done?'✓ Đã học':'☆ Đánh dấu đã học';const completed=pool.filter(x=>learned.has(x.id)).length;$('#progressText').textContent=`${index+1}/${pool.length} • Đã học ${completed}`;$('#progressBar').style.width=`${pool.length?completed/pool.length*100:0}%`;setFlipped(false)}
  function change(n){index=(index+n+pool.length)%pool.length;updateCard()}
  function filterCards(){const id=$('#cardSection').value;pool=id==='all'?[...vocab]:vocab.filter(v=>v.group===id);index=0;updateCard()}
  $('#cardSection').innerHTML='<option value="all">Tất cả các phần</option>'+groups.map(g=>`<option value="${g.id}">${g.title}</option>`).join('');
  $('#flashcard').addEventListener('click',e=>{if(e.target.closest('#speaker')){e.stopPropagation();speak(pool[index].speak);return}setFlipped(!flipped,!flipped)});
  $('#prev').onclick=()=>change(-1);$('#next').onclick=()=>change(1);$('#cardSection').onchange=filterCards;
  $('#shuffle').onclick=()=>{for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}index=0;updateCard()};
  $('#learn').onclick=()=>{const id=pool[index].id;learned.has(id)?learned.delete(id):learned.add(id);localStorage.setItem('drivingVocabLearned',JSON.stringify([...learned]));updateCard()};
  $$('.tab').forEach(b=>b.onclick=()=>{$$('.tab').forEach(x=>x.classList.toggle('active',x===b));$$('.panel').forEach(p=>p.classList.toggle('active',p.id===b.dataset.tab));if(b.dataset.tab==='list')renderList()});
  function renderList(){const q=$('#search').value.trim().toLocaleLowerCase('ja');let total=0;const out=groups.map(g=>{const items=vocab.filter(v=>v.group===g.id&&(v.plain.toLocaleLowerCase('ja').includes(q)||v.speak.toLocaleLowerCase('ja').includes(q)||v.vi.toLocaleLowerCase('vi').includes(q)));if(!items.length)return'';total+=items.length;return `<section class="section"><h2 class="section-title"><span>${g.title}</span><span class="count">${items.length} từ</span></h2><ul class="vocab-list">${items.map(v=>`<li class="vocab-item"><div><div class="term">${renderParts(v.parts)}</div><div class="vi">${escapeHTML(v.vi)}</div></div><button class="play" data-speak="${escapeHTML(v.speak)}" aria-label="Đọc ${escapeHTML(v.plain)}">🔊</button></li>`).join('')}</ul></section>`}).join('');$('#sections').innerHTML=out||'<div class="empty">Không tìm thấy từ phù hợp.</div>';$('#listSummary').textContent=`Hiển thị ${total}/${vocab.length} mục`;$$('.play').forEach(b=>b.onclick=()=>speak(b.dataset.speak))}
  $('#search').oninput=renderList;
  window.addEventListener('scroll',()=>$('#top').classList.toggle('show',scrollY>500));$('#top').onclick=()=>scrollTo({top:0,behavior:'smooth'});
  updateCard();renderList();
  </script>
</body>
</html>
